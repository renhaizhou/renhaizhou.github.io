<svg xmlns="http://www.w3.org/2000/svg" version="1.1" xlink="http://www.w3.org/1999/xlink" id="mind-svg-con" width="2843.625px" height="783.484375px" style="position: absolute; left: 0px; top: 0px; width: 2843.63px; height: 783.484px; z-index: 999;"><defs></defs><rect x="0" y="0" width="2843.625" height="783.484375" fill="#f8f8f8"></rect><g id="a2ca11e51d09"><rect x="1192" y="462.75" rx="6px" ry="6px" width="229" height="89" style="fill: #fac6d2; stroke:#80bc42;stroke-width:2px;"></rect><g><text y="465.95" text-anchor="start" align="top" anchor="start" font-family="微软雅黑" font-size="17px" font-weight="normal" fill="rgb(0, 118, 179)"><tspan x="1206" dy="23"><tspan>2.Server</tspan></tspan><tspan x="1206" dy="23"><tspan>ApplicationResource类</tspan></tspan><tspan x="1206" dy="23"><tspan>responseCache 只读缓存</tspan></tspan></text></g></g><g id="92d763472baa"><rect x="1451.28125" y="268.75" rx="6px" ry="6px" width="653" height="66" style="fill: #ccccff; stroke:#31a8e0;stroke-width:2px;"></rect><g><text y="271.95" text-anchor="start" align="top" anchor="start" font-family="微软雅黑" font-size="17px" font-weight="normal" fill="rgb(0, 118, 179)"><tspan x="1465.28125" dy="23"><tspan>注册</tspan></tspan><tspan x="1465.28125" dy="23"><tspan>register(InstanceInfo registrant, int leaseDuration, boolean isReplication)</tspan></tspan></text></g></g><g id="746d5e883050"><rect x="2134.625" y="261" rx="0px" ry="0px" width="679" height="45" style="fill: #ffffcc; stroke:#00a650;stroke-width:2px;"></rect><g><text y="259.8" text-anchor="start" align="top" anchor="start" font-family="微软雅黑" font-size="13px" font-weight="normal" fill="rgb(22, 136, 74)"><tspan x="2142.625" dy="18"><tspan>1.ConcurrentHashMap&lt;String, Map&lt;String, Lease&lt;InstanceInfo&gt;&gt;&gt; registry 实例变量存储同服务多实例</tspan></tspan><tspan x="2142.625" dy="18"><tspan> </tspan></tspan><tspan x="2142.625" dy="18"><tspan>key 服务名 USER-SERVICE value 里面的 key 172.16.10.34:user-service:8082</tspan></tspan></text></g></g><g id="bc966c6ff258"><rect x="2134.625" y="314" rx="0px" ry="0px" width="239" height="28" style="fill: #ffffcc; stroke:#00a650;stroke-width:2px;"></rect><g><text y="314.284375" text-anchor="start" align="top" anchor="start" font-family="微软雅黑" font-size="13px" font-weight="normal" fill="rgb(22, 136, 74)"><tspan x="2142.625" dy="18"><tspan>2.invalidateCache 设置响应缓存过期</tspan></tspan></text></g></g><g id="63da078bb0c8"><rect x="1451.28125" y="350.484375" rx="6px" ry="6px" width="94" height="66" style="fill: #ccccff; stroke:#31a8e0;stroke-width:2px;"></rect><g><text y="353.684375" text-anchor="start" align="top" anchor="start" font-family="微软雅黑" font-size="17px" font-weight="normal" fill="rgb(0, 118, 179)"><tspan x="1465.28125" dy="23"><tspan>续约</tspan></tspan><tspan x="1465.28125" dy="23"><tspan>renew()</tspan></tspan></text></g></g><g id="f7ce1178d9ae"><rect x="1575.015625" y="369.234375" rx="0px" ry="0px" width="319" height="28" style="fill: #ffffcc; stroke:#00a650;stroke-width:2px;"></rect><g><text y="369.51875" text-anchor="start" align="top" anchor="start" font-family="微软雅黑" font-size="13px" font-weight="normal" fill="rgb(22, 136, 74)"><tspan x="1583.015625" dy="18"><tspan>1.lastUpdateTimestamp 设置租约的最后更新时间</tspan></tspan></text></g></g><g id="798292166d28"><rect x="1451.28125" y="424.484375" rx="6px" ry="6px" width="580" height="66" style="fill: #ccccff; stroke:#31a8e0;stroke-width:2px;"></rect><g><text y="427.684375" text-anchor="start" align="top" anchor="start" font-family="微软雅黑" font-size="17px" font-weight="normal" fill="rgb(0, 118, 179)"><tspan x="1465.28125" dy="23"><tspan>下线</tspan></tspan><tspan x="1465.28125" dy="23"><tspan>internalCancel(String appName, String id, boolean isReplication)</tspan></tspan></text></g></g><g id="541f8e81a178"><rect x="2061.703125" y="434.984375" rx="0px" ry="0px" width="517" height="45" style="fill: #ffffcc; stroke:#00a650;stroke-width:2px;"></rect><g><text y="433.784375" text-anchor="start" align="top" anchor="start" font-family="微软雅黑" font-size="13px" font-weight="normal" fill="rgb(22, 136, 74)"><tspan x="2069.703125" dy="18"><tspan>1.InstanceStatus instanceStatus = overriddenInstanceStatusMap.remove(id);</tspan></tspan><tspan x="2069.703125" dy="18"><tspan>移除应用实例覆盖状态映射</tspan></tspan></text></g></g><g id="8c554e307a6f"><rect x="1451.28125" y="498.484375" rx="6px" ry="6px" width="487" height="112" style="fill: #ccccff; stroke:#31a8e0;stroke-width:2px;"></rect><g><text y="501.684375" text-anchor="start" align="top" anchor="start" font-family="微软雅黑" font-size="17px" font-weight="normal" fill="rgb(0, 118, 179)"><tspan x="1465.28125" dy="23"><tspan>实例覆盖状态变更</tspan></tspan><tspan x="1465.28125" dy="23"><tspan>statusUpdate(String appName, String id,</tspan></tspan><tspan x="1465.28125" dy="23"><tspan>                                </tspan></tspan><tspan x="1465.28125" dy="23"><tspan>InstanceStatus newStatus, String lastDirtyTimestamp,</tspan></tspan><tspan x="1465.28125" dy="23"><tspan>                                </tspan></tspan><tspan x="1465.28125" dy="23"><tspan>boolean isReplication)</tspan></tspan></text></g></g><g id="985cc43735fd"><rect x="1451.28125" y="618.484375" rx="6px" ry="6px" width="444" height="135" style="fill: #ccccff; stroke:#31a8e0;stroke-width:2px;"></rect><g><text y="621.684375" text-anchor="start" align="top" anchor="start" font-family="微软雅黑" font-size="17px" font-weight="normal" fill="rgb(0, 118, 179)"><tspan x="1465.28125" dy="23"><tspan>实例覆盖状态删除</tspan></tspan><tspan x="1465.28125" dy="23"><tspan>deleteStatusOverride(String appName, String id,</tspan></tspan><tspan x="1465.28125" dy="23"><tspan>                                        </tspan></tspan><tspan x="1465.28125" dy="23"><tspan>InstanceStatus newStatus,</tspan></tspan><tspan x="1465.28125" dy="23"><tspan>                                        </tspan></tspan><tspan x="1465.28125" dy="23"><tspan>String lastDirtyTimestamp,</tspan></tspan><tspan x="1465.28125" dy="23"><tspan>                                        </tspan></tspan><tspan x="1465.28125" dy="23"><tspan>boolean isReplication)</tspan></tspan></text></g></g><g id="37e8f5e06d91"><rect x="1192" y="99.5" rx="6px" ry="6px" width="360" height="66" style="fill: #fac6d2; stroke:#80bc42;stroke-width:2px;"></rect><g><text y="102.7" text-anchor="start" align="top" anchor="start" font-family="微软雅黑" font-size="17px" font-weight="normal" fill="rgb(0, 118, 179)"><tspan x="1206" dy="23"><tspan>1.client</tspan></tspan><tspan x="1206" dy="23"><tspan>DiscoveryClient类 initScheduledTasks()</tspan></tspan></text></g></g><g id="6bb6db42f417"><rect x="1582.1875" y="30" rx="0px" ry="0px" width="376" height="45" style="fill: #ffffcc; stroke:#00a650;stroke-width:2px;"></rect><g><text y="28.8" text-anchor="start" align="top" anchor="start" font-family="微软雅黑" font-size="13px" font-weight="normal" fill="rgb(22, 136, 74)"><tspan x="1590.1875" dy="18"><tspan>1.CacheRefreshThread线程刷新本地缓存定时</tspan></tspan><tspan x="1590.1875" dy="18"><tspan>registryFetchIntervalSeconds = 30 默认值每30秒执行一次</tspan></tspan></text></g></g><g id="4dbd2a31d100"><rect x="1582.1875" y="83" rx="0px" ry="0px" width="407" height="45" style="fill: #ffffcc; stroke:#00a650;stroke-width:2px;"></rect><g><text y="81.8" text-anchor="start" align="top" anchor="start" font-family="微软雅黑" font-size="13px" font-weight="normal" fill="rgb(22, 136, 74)"><tspan x="1590.1875" dy="18"><tspan>2.HeartbeatThread线程续约</tspan></tspan><tspan x="1590.1875" dy="18"><tspan>renewalIntervalInSecs = 30 默认值每30秒像服务器发送一次心跳</tspan></tspan></text></g></g><g id="b7280bad6918"><rect x="1582.1875" y="136" rx="0px" ry="0px" width="602" height="99" style="fill: #ffffcc; stroke:#00a650;stroke-width:2px;"></rect><g><text y="134.8" text-anchor="start" align="top" anchor="start" font-family="微软雅黑" font-size="13px" font-weight="normal" fill="rgb(22, 136, 74)"><tspan x="1590.1875" dy="18"><tspan>3.InstanceInfoReplicator线程服务注册</tspan></tspan><tspan x="1590.1875" dy="18"><tspan>InstanceInfoReplicationIntervalSeconds = 30 复制实例变化到eureka服务器所需要的时间 </tspan></tspan><tspan x="1590.1875" dy="18"><tspan>InitialInstanceInfoReplicationIntervalSeconds = 40 最初复制实例到eureka服务器所需要的时间</tspan></tspan><tspan x="1590.1875" dy="18"><tspan>InstanceStatus 实例状态 UP DOWN STARTING OUT_OF_SERVICE UNKNOWN</tspan></tspan><tspan x="1590.1875" dy="18"><tspan>观察者事件监听实例状态变化</tspan></tspan></text></g></g><g id="e901d4c86ee5"><rect x="30" y="370" rx="6px" ry="6px" width="928" height="181" style="fill: #fac6d2; stroke:#80bc42;stroke-width:2px;"></rect><g><text y="373.2" text-anchor="start" align="top" anchor="start" font-family="微软雅黑" font-size="17px" font-weight="normal" fill="rgb(0, 118, 179)"><tspan x="44" dy="23"><tspan>4.参数调优</tspan></tspan><tspan x="44" dy="23"><tspan>eureka.client.leaseRenewalIntervalInSeconds = 30 客户端续约</tspan></tspan><tspan x="44" dy="23"><tspan>eureka.instance.leaseExpirationDurationInSeconds = 90 服务器自从收到最后一次心跳到移除此实例的等待时间，</tspan></tspan><tspan x="44" dy="23"><tspan>eureka.client.registryFetchIntervalSeconds = 30 客户端更新本地缓存</tspan></tspan><tspan x="44" dy="23"><tspan>eureka.server.responseCacheUpdateIntervalMs = 3000 服务器端缓存更新的定时器时间间隔</tspan></tspan><tspan x="44" dy="23"><tspan>eureka.server.evictionIntervalTimerInMs = 60000 服务器端移除无效的的客户端时间间隔</tspan></tspan></text></g></g><g id="72b27f9d29a1"><rect x="451.796875" y="232" rx="6px" ry="6px" width="506" height="112" style="fill: #fac6d2; stroke:#80bc42;stroke-width:2px;"></rect><g><text y="235.2" text-anchor="start" align="top" anchor="start" font-family="微软雅黑" font-size="17px" font-weight="normal" fill="rgb(0, 118, 179)"><tspan x="465.796875" dy="23"><tspan>3. 缓存ResponseCacheImpl</tspan></tspan><tspan x="465.796875" dy="23"><tspan>readOnlyCacheMap只读缓存</tspan></tspan><tspan x="465.796875" dy="23"><tspan>readWriteCacheMap读写缓存</tspan></tspan><tspan x="465.796875" dy="23"><tspan>responseCacheUpdateIntervalMs 默认值30秒只读缓存刷新</tspan></tspan></text></g></g><g transform="translate(1192, 261)" id="sdjakdjak0"><g id="subline_a2ca11e51d09" transform="translate(0.5,-0.5)"><pa